<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- The site has its own EN/KO switcher (src/i18n) — discourage the
         browser's built-in page translator (Google Translate) from also
         rewriting the DOM, since that conflicts with React's own updates
         and can crash the page (see main.tsx for the defensive patch). -->
    <meta name="google" content="notranslate" />
    <title>Manila Tour- 마닐라 여행</title>
    <link rel="icon" type="image/jpeg" href="/logo-mark.jpg" />
    <!-- Inter — used by the /admin Flux-style console -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome (solid + brands) — loaded non-render-blocking -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
